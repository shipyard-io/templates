# =============================================================================
# Shipyard — healthcheck.yml
# Snippet chuẩn cho healthcheck, copy vào docker-compose.yml của project
# deploy-ssh.yml dùng endpoint này để verify sau khi deploy
# =============================================================================

# Paste vào service trong docker-compose.yml:

# healthcheck:
#   test:
#     - "CMD"
#     - "wget"
#     - "--no-verbose"
#     - "--tries=1"
#     - "--spider"
#     - "http://localhost:${APP_PORT}/health"
#   interval: 30s
#   timeout: 10s
#   retries: 3
#   start_period: 20s

# =============================================================================
# App phải có endpoint GET /health trả về HTTP 200
# Ví dụ từng ngôn ngữ:
# =============================================================================

# Node.js / Express:
# app.get('/health', (req, res) => res.json({ status: 'ok' }))

# Python / FastAPI:
# @app.get("/health")
# def health(): return {"status": "ok"}

# Python / Flask:
# @app.route("/health")
# def health(): return {"status": "ok"}

# Go / Gin:
# r.GET("/health", func(c *gin.Context) {
#     c.JSON(200, gin.H{"status": "ok"})
# })

# Nếu app không có /health — dùng TCP check thay thế:
# healthcheck:
#   test: ["CMD-SHELL", "nc -z localhost ${APP_PORT} || exit 1"]
#   interval: 30s
#   timeout: 10s
#   retries: 3
#   start_period: 20s
