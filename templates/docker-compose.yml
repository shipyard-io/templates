---
services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    container_name: ${APP_NAME}
    env_file:
      - .env
    restart: unless-stopped

    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          curl -f http://localhost:${APP_PORT}/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # HTTP → HTTPS
      - "traefik.http.routers.${APP_NAME}-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}-http.entrypoints=web"
      - "traefik.http.routers.${APP_NAME}-http.middlewares=redirect-https"

      # middleware
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

      # HTTPS
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls=true"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=letsencrypt"

      # service
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=${APP_PORT}"

      # Shipyard
      - "shipyard.managed=true"
      - "shipyard.project=${APP_NAME}"
      - "shipyard.domain=${APP_DOMAIN}"

networks:
  proxy:
    external: true
