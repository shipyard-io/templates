version: "2.1"

jobs:
  build-docker:
    description: "Build & Push Docker Image to GHCR"
    docker:
      - image: cimg/base:current
    parameters:
      app-name:
        type: string
        description: "Application name used in the GHCR image name"
      dockerfile:
        type: string
        default: "Dockerfile"
        description: "Path to the Dockerfile"
      context:
        type: string
        default: "."
        description: "Docker build context"
    steps:
      - checkout
      - setup_remote_docker:
          version: "24.0"
      - run:
          name: Login to GHCR
          command: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$CIRCLE_PROJECT_USERNAME" --password-stdin
      - run:
          name: Extract image metadata and Build
          command: |
            curl -sSL https://raw.githubusercontent.com/shipyard-io/templates/main/scripts/build-docker.sh | bash -s -- \
              "ghcr.io/$CIRCLE_PROJECT_USERNAME" \
              "<< parameters.app-name >>" \
              "$CIRCLE_SHA1" \
              "<< parameters.dockerfile >>" \
              "<< parameters.context >>" \
              "$CIRCLE_BRANCH"
