version: "2.1"

jobs:
  rollback:
    description: "Rollback via SSH"
    docker:
      - image: cimg/base:current
    parameters:
      app-name:
        type: string
        description: "Application name"
      image-tag:
        type: string
        description: "Image tag to rollback to"
    steps:
      - checkout
      - run:
          name: Setup SSH key
          command: |
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
            cat >> ~/.ssh/config \<<EOF
            Host *
              ServerAliveInterval 60
              ServerAliveCountMax 10
            EOF
      - run:
          name: Execute Rollback
          command: |
            SERVER_USER="${SERVER_USER:-ubuntu}"
            ssh ${SERVER_USER}@${SERVER_IP} \
              "echo '${GITHUB_TOKEN}' | docker login ghcr.io -u '${CIRCLE_PROJECT_USERNAME}' --password-stdin 2>/dev/null; \
               curl -sSL https://raw.githubusercontent.com/shipyard-io/templates/main/scripts/rollback.sh | bash -s -- '<< parameters.app-name >>' '<< parameters.image-tag >>'"
