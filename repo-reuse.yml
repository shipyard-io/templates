name: CI/CD

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    uses: shipyard-io/templates/.github/workflows/reusable-prepare.yml@main
    secrets:
      ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}

  build:
    needs: [prepare]
    uses: shipyard-io/templates/.github/workflows/reusable-build-docker.yml@main
    with:
      app-name: ${{ needs.prepare.outputs['app-name'] }}
      dockerfile: 'Backend/Dockerfile'
      context: 'Backend'
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  setup-vps:
    needs: [prepare]
    if: needs.prepare.outputs['init-infra'] == 'true'
    uses: shipyard-io/templates/.github/workflows/reusable-provision-vps.yml@main
    secrets:
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      CLOUDFLARE_ORIGIN_CERT: ${{ secrets.CLOUDFLARE_ORIGIN_CERT }}
      CLOUDFLARE_ORIGIN_KEY: ${{ secrets.CLOUDFLARE_ORIGIN_KEY }}
      DOMAIN: ${{ secrets.DOMAIN }}
      TRAEFIK_DASHBOARD_AUTH: ${{ secrets.TRAEFIK_DASHBOARD_AUTH }}

  setup-traefik:
    needs: [prepare, setup-vps]
    if: always() && needs.prepare.outputs['init-infra'] == 'true' && (needs.setup-vps.result == 'success' || needs.setup-vps.result == 'skipped')
    uses: shipyard-io/templates/.github/workflows/reusable-upgrade-traefik.yml@main
    secrets:
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      CLOUDFLARE_ORIGIN_CERT: ${{ secrets.CLOUDFLARE_ORIGIN_CERT }}
      CLOUDFLARE_ORIGIN_KEY: ${{ secrets.CLOUDFLARE_ORIGIN_KEY }}
      DOMAIN: ${{ secrets.DOMAIN }}
      TRAEFIK_DASHBOARD_AUTH: ${{ secrets.TRAEFIK_DASHBOARD_AUTH }}

  deploy:
    needs: [prepare, build, setup-traefik]
    if: always() && needs.build.result == 'success' && (needs.setup-traefik.result == 'success' || needs.setup-traefik.result == 'skipped')
    uses: shipyard-io/templates/.github/workflows/reusable-deploy-ssh.yml@main
    with:
      app-name: ${{ needs.prepare.outputs['app-name'] }}
      image-tag: ${{ needs.build.outputs['image-tag'] }}
      health-check-path: '/'
      compose-file: 'Devops/Backend/docker-compose.prod.yml'
    secrets:
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  notify:
    needs: [prepare, build, deploy]
    if: always()
    uses: shipyard-io/templates/.github/workflows/reusable-notify.yml@main
    with:
      app-name: ${{ needs.prepare.outputs['app-name'] }}
      app-domain: ${{ needs.prepare.outputs['app-domain'] }}
      status: ${{ needs.deploy.result }}
      commit-message: ${{ github.event.head_commit.message }}
      actor: ${{ github.actor }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

