services:
  traefik:
    image: traefik:v3.6.14
    container_name: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.41

    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "127.0.0.1:8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic.yml:/dynamic.yml:ro
      - ./certs/origin.pem:/certs/origin.pem:ro
      - ./certs/origin.key:/certs/origin.key:ro

    networks:
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:?DOMAIN is required}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"

      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth,redirect-dashboard"

      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:?TRAEFIK_DASHBOARD_AUTH is required}"

      - "traefik.http.middlewares.redirect-dashboard.redirectregex.regex=^https?://([^/]+)/?$"
      - "traefik.http.middlewares.redirect-dashboard.redirectregex.replacement=https://$${1}/dashboard/"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true