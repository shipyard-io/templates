name: Prepare Environment

on:
  workflow_call:
    outputs:
      app-name:
        description: "Application name extracted from env content and lowercased"
        value: ${{ jobs.prepare.outputs.app-name }}
      app-domain:
        description: "Application domain extracted from env content"
        value: ${{ jobs.prepare.outputs.app-domain }}
    secrets:
      ENV_FILE_CONTENT:
        required: true

jobs:
  prepare:
    name: Resolve Variables
    runs-on: ubuntu-latest
    outputs:
      app-name: ${{ steps.vars.outputs.app_name }}
      app-domain: ${{ steps.vars.outputs.app_domain }}
    steps:
      - name: Resolve variables from Secret content
        id: vars
        shell: bash
        run: |
          CONTENT="${{ secrets.ENV_FILE_CONTENT }}"
          
          if [ -z "$CONTENT" ]; then
            echo "Error: ENV_FILE_CONTENT secret is empty"
            exit 1
          fi

          # Extract values from the secret content string
          APP_NAME_RAW=$(echo "$CONTENT" | grep -E '^APP_NAME=' | head -n1 | cut -d= -f2- | tr -d '\r' | xargs || true)
          APP_DOMAIN=$(echo "$CONTENT" | grep -E '^APP_DOMAIN=' | head -n1 | cut -d= -f2- | tr -d '\r' | xargs || true)

          if [ -z "$APP_NAME_RAW" ]; then
            echo "Error: APP_NAME is missing in ENV_FILE_CONTENT secret"
            exit 1
          fi
          
          # Convert APP_NAME to lowercase for Docker compatibility
          APP_NAME="$(echo "$APP_NAME_RAW" | tr '[:upper:]' '[:lower:]')"
          
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "app_domain=$APP_DOMAIN" >> "$GITHUB_OUTPUT"
          
          # Mask outputs to be safe since they come from secrets
          echo "Resolved APP_NAME: $APP_NAME"
          if [ -n "$APP_DOMAIN" ]; then
            echo "Resolved APP_DOMAIN: $APP_DOMAIN"
          fi
