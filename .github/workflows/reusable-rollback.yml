# =============================================================================
# Shipyard — .github/workflows/reusable-rollback.yml
# Roll back to a specific version
# Supports two triggers:
#   workflow_dispatch: manual trigger from GitHub Actions UI
#   workflow_call: automatic trigger from another workflow
# =============================================================================

name: Rollback

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      app-name:
        description: "Application name to roll back"
        required: true
        type: string
      image-tag:
        description: "Target image tag (git SHA). Empty value falls back to previous version."
        required: false
        type: string
        default: ""

  # Automatic trigger from another workflow
  workflow_call:
    inputs:
      app-name:
        description: "Application name to roll back"
        required: true
        type: string
      image-tag:
        description: "Target image tag (git SHA). Empty value falls back to previous version."
        required: false
        type: string
        default: ""

    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SERVER_IP:
        required: true
      SERVER_USER:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  rollback:
    name: Rollback
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Execute Rollback
        id: resolve
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || 'ubuntu' }}
          ROLLBACK_SCRIPT_SHA: 1376460315569c321551424d4d28f41a7b6892c1
        run: |
          set -euo pipefail
          case "${{ inputs.app-name }}" in
            ''|*[!a-zA-Z0-9._-]*)
              echo "Invalid app-name. Allowed chars: a-z A-Z 0-9 . _ -"
              exit 1
              ;;
          esac

          ssh ${SERVER_USER}@${{ secrets.SERVER_IP }} \
            "set -euo pipefail; \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin 2>/dev/null; \
             curl -fsSL https://raw.githubusercontent.com/shipyard-io/templates/${ROLLBACK_SCRIPT_SHA}/scripts/rollback.sh | bash -s -- '${{ inputs.app-name }}' '${{ inputs.image-tag }}'"
          # For notification, we use the fallback tag logic
          TARGET_TAG="${{ inputs.image-tag }}"
          if [ -z "$TARGET_TAG" ]; then
             TARGET_TAG=$(ssh ${SERVER_USER}@${{ secrets.SERVER_IP }} "cat /apps/${{ inputs.app-name }}/.current-tag 2>/dev/null || echo 'latest'")
          fi
          echo "tag=${TARGET_TAG}" >> $GITHUB_OUTPUT

      # Send Telegram notification
      - name: Notify rollback result
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ job.status }}" = "success" ]; then
            LABEL="Rolled back successfully"
          else
            LABEL="Rollback failed"
          fi

          MESSAGE="*${{ inputs.app-name }}* - ${LABEL}

          *Rolled back to:* \`${{ steps.resolve.outputs.tag }}\`
          *Triggered by:* ${{ github.actor }}
          *Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true"
