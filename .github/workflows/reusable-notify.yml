name: Notify Telegram

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name"
        required: true
        type: string
      status:
        description: "Deployment status: success | failure | cancelled"
        required: true
        type: string
      commit-message:
        description: "Commit message"
        required: false
        type: string
        default: "N/A"
      actor:
        description: "User who triggered the workflow"
        required: false
        type: string
        default: "unknown"

    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest

    steps:
      - name: Set status message
        id: status
        run: |
          case "${{ inputs.status }}" in
            success)
              echo "label=Deployed successfully" >> $GITHUB_OUTPUT
              ;;
            failure)
              echo "label=Deploy failed" >> $GITHUB_OUTPUT
              ;;
            cancelled)
              echo "label=Deploy cancelled" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "label=Deploy status unknown" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Send Telegram message
        run: |
          STATUS="${{ inputs.status }}"
          STATUS_LABEL="${{ steps.status.outputs.label }}"

          ICON="🚀"
          if [[ "$STATUS" == "failure" ]]; then ICON="❌"; fi
          if [[ "$STATUS" == "success" ]]; then ICON="✅"; fi
          if [[ "$STATUS" == "cancelled" ]]; then ICON="⚠️"; fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SHORT_COMMIT=$(echo "${{ inputs.commit-message }}" | head -n 1)

          MESSAGE="
          ━━━━━━━━━━━━━━━━━━━━━━━━
          ${ICON} *${{ inputs.app-name }}*
          ━━━━━━━━━━━━━━━━━━━━━━━━

          📌 *Status:* \`${STATUS_LABEL}\`
          🌿 *Branch:* \`${{ github.ref_name }}\`
          👤 *Actor:* \`${{ inputs.actor }}\`

          💬 *Commit:*
          \`${SHORT_COMMIT}\`

          🔖 *SHA:* \`${SHORT_SHA}\`

          ━━━━━━━━━━━━━━━━━━━━━━━━
          🔎 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          "

          # Remove leading whitespaces for clean Markdown formatting
          MESSAGE=$(echo "$MESSAGE" | sed 's/^[ \t]*//')

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true"

          echo "Telegram card sent."
