name: Notify Telegram

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name"
        required: true
        type: string
      status:
        description: "Deployment status: success | failure | cancelled"
        required: true
        type: string
      commit-message:
        description: "Commit message"
        required: false
        type: string
        default: "N/A"
      actor:
        description: "User who triggered the workflow"
        required: false
        type: string
        default: "unknown"

    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest

    steps:
      - name: Set status message
        id: status
        run: |
          case "${{ inputs.status }}" in
            success)
              echo "label=Deployed successfully" >> $GITHUB_OUTPUT
              ;;
            failure)
              echo "label=Deploy failed" >> $GITHUB_OUTPUT
              ;;
            cancelled)
              echo "label=Deploy cancelled" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "label=Deploy status unknown" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sSL https://raw.githubusercontent.com/shipyard-io/templates/main/scripts/notify.sh | bash -s -- \
            "${{ inputs.app-name }}" \
            "${{ inputs.status }}" \
            "${{ inputs.commit-message }}" \
            "${{ inputs.actor }}" \
            "${{ github.sha }}" \
            "${{ github.ref_name }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}"
