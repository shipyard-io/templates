name: Deploy via SSH

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name used for /apps/<app-name> on the target server"
        required: true
        type: string
      image-tag:
        description: "Image tag to deploy (git SHA)"
        required: true
        type: string
      compose-file:
        description: "Path to docker compose file in the caller repository"
        required: false
        type: string
        default: "docker-compose.yml"
      health-check-path:
        description: "Endpoint health check"
        required: false
        type: string
        default: "/health"
      health-check-retries:
        description: "Number of health check retries"
        required: false
        type: number
        default: 5

    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SERVER_IP:
        required: true
      SERVER_USER:
        required: false
      ENV_FILE_CONTENT:
        required: true
jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host *
            ServerAliveInterval 60
            ServerAliveCountMax 10
          EOF

      - name: Upload Docker Compose file
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || 'ubuntu' }}
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.compose-file }}" ]; then
            echo "Compose file not found in repository: ${{ inputs.compose-file }}"
            exit 1
          fi

          case "${{ inputs.app-name }}" in
            ''|*[!a-zA-Z0-9._-]*)
              echo "Invalid app-name. Allowed chars: a-z A-Z 0-9 . _ -"
              exit 1
              ;;
          esac

          ssh ${SERVER_USER}@${{ secrets.SERVER_IP }} \
            "mkdir -p /apps/${{ inputs.app-name }}"
          scp "${{ inputs.compose-file }}" \
            "${SERVER_USER}@${{ secrets.SERVER_IP }}:/apps/${{ inputs.app-name }}/docker-compose.yml"

      # Save current image tag for rollback
      - name: Save current image tag for rollback
        id: current
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || 'ubuntu' }}
        run: |
          set -euo pipefail
          CURRENT_TAG=$(ssh ${SERVER_USER}@${{ secrets.SERVER_IP }} \
            "cat /apps/${{ inputs.app-name }}/.current-tag 2>/dev/null || echo 'latest'")
          echo "tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
          echo "Current tag: ${CURRENT_TAG}"

      # Deploy new image
      - name: Deploy new image
        env:
          SERVER_USER: ${{ secrets.SERVER_USER || 'ubuntu' }}
          DEPLOY_SCRIPT_SHA: 1376460315569c321551424d4d28f41a7b6892c1
        run: |
          set -euo pipefail
          case "${{ inputs.app-name }}" in
            ''|*[!a-zA-Z0-9._-]*)
              echo "Invalid app-name. Allowed chars: a-z A-Z 0-9 . _ -"
              exit 1
              ;;
          esac

          if [ -z "${{ inputs.image-tag }}" ]; then
            echo "image-tag is required"
            exit 1
          fi

          if ! [[ "${{ inputs.health-check-retries }}" =~ ^[0-9]+$ ]]; then
            echo "health-check-retries must be a non-negative integer"
            exit 1
          fi

          # Write .env file
          ssh ${SERVER_USER}@${{ secrets.SERVER_IP }} "cat > /apps/${{ inputs.app-name }}/.env" <<EOF
          ${{ secrets.ENV_FILE_CONTENT }}
          EOF

          # Call the centralized deploy script on the VPS
          ssh ${SERVER_USER}@${{ secrets.SERVER_IP }} \
            "set -euo pipefail; \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin 2>/dev/null; \
             curl -fsSL https://raw.githubusercontent.com/shipyard-io/templates/${DEPLOY_SCRIPT_SHA}/scripts/deploy.sh | bash -s -- \
               '${{ inputs.app-name }}' \
               '${{ inputs.image-tag }}' \
               '${{ inputs.health-check-path }}' \
               '${{ inputs.health-check-retries }}' \
               'ghcr.io/${{ github.repository_owner }}'"

      - name: Print deploy summary
        if: success()
        run: |
          set -euo pipefail
          echo "Deployment summary"
          echo "Application: ${{ inputs.app-name }}"
          echo "Image tag:   ${{ inputs.image-tag }}"
          echo "Server:      ${{ secrets.SERVER_IP }}"
