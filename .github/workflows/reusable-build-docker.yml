name: Build Docker Image

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name used in the GHCR image name"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."

    outputs:
      image-tag:
        description: "Built image tag (short git SHA)"
        value: ${{ jobs.build.outputs.image-tag }}
      image-name:
        description: "Fully qualified image name including registry"
        value: ${{ jobs.build.outputs.image-name }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.app-name }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata
      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      # Build and push image using centralized script
      - name: Build and push image
        run: |
          IS_MAIN="false"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then IS_MAIN="true"; fi

          curl -sSL https://raw.githubusercontent.com/shipyard-io/templates/main/scripts/build-docker.sh | bash -s -- \
            "ghcr.io/${{ github.repository_owner }}" \
            "${{ inputs.app-name }}" \
            "${{ steps.meta.outputs.version }}" \
            "${{ inputs.dockerfile }}" \
            "${{ inputs.context }}" \
            "$IS_MAIN"

      - name: Print image info
        run: |
          echo "Image build completed successfully."
          echo "Primary tag: ${{ steps.meta.outputs.version }}"
